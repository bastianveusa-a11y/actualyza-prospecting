<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualyza — Pre-vuelo de Campaña</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #080910; --bg2: #0d0e1a; --bg3: #12131f;
  --card:     rgba(255,255,255,0.03); --border: rgba(255,255,255,0.07);
  --border-h: rgba(201,169,110,0.3);
  --gold:     #c9a96e; --gold-l: #e8c97a; --gold-d: #9a7840;
  --text:     #eeeef8; --text2: #7878a0; --text3: #50506a;
  --blue:     #5080ff; --green: #40c898; --orange: #ff9050;
  --red:      #ff5070; --purple: #b060f0; --teal: #40d0c0;
  --r: 12px; --r-sm: 8px;
}
html { font-size: 14px; }
body {
  font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(80,128,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(201,169,110,0.05) 0%, transparent 60%);
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.shell { max-width: 1400px; margin: 0 auto; padding: 24px 28px 48px; }
.main-grid { display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: start; }

header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #0a0a0f;
}
.logo-text { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
.logo-text span { color: var(--gold); }
.logo-sub { font-size: 0.72rem; color: var(--text3); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.btn {
  display: flex; align-items: center; gap: 6px; padding: 7px 14px;
  border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--card);
  color: var(--text2); font-size: 0.8rem; font-weight: 500; cursor: pointer;
  transition: all .2s; font-family: 'Inter', sans-serif; text-decoration: none;
}
.btn:hover { border-color: var(--border-h); color: var(--gold); background: rgba(201,169,110,0.06); }
.btn svg { width: 14px; height: 14px; }

/* Left panel */
.left-panel {
  position: sticky; top: 24px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 18px 16px;
}
.panel-label {
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 16px;
}
.city-section { margin-bottom: 20px; }
.city-name { font-size: 0.72rem; font-weight: 600; color: var(--text2); margin-bottom: 8px; padding-left: 2px; }
.group-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 8px 12px; border-radius: var(--r-sm);
  border: 1px solid transparent; background: transparent;
  color: var(--text2); font-size: 0.8rem; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: all .15s; margin-bottom: 4px;
}
.group-btn:hover { background: rgba(255,255,255,0.04); border-color: var(--border); color: var(--text); }
.group-btn.active { background: rgba(201,169,110,0.1); border-color: rgba(201,169,110,0.3); color: var(--gold); }
.group-count {
  font-size: 0.7rem; font-weight: 600; padding: 1px 7px;
  border-radius: 10px; background: rgba(255,255,255,0.07); color: var(--text3);
}
.group-btn.active .group-count { background: rgba(201,169,110,0.15); color: var(--gold); }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 400px; gap: 12px; color: var(--text3); text-align: center;
}
.empty-icon { font-size: 2.5rem; opacity: .4; }
.empty-title { font-size: 0.9rem; font-weight: 500; color: var(--text2); }
.empty-sub { font-size: 0.78rem; }

/* Pre-flight */
.preflight { display: flex; flex-direction: column; gap: 20px; }

.group-header {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 20px 24px;
}
.group-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 14px; }
.stats-row { display: flex; gap: 24px; flex-wrap: wrap; }
.stat-item { display: flex; flex-direction: column; gap: 2px; }
.stat-val { font-size: 1.3rem; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: 0.68rem; color: var(--text3); }

.seq-label {
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
}
.seq-list { display: flex; flex-direction: column; gap: 10px; }

.email-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
  overflow: hidden; display: grid; grid-template-columns: 1fr auto; transition: border-color .2s;
}
.email-card:hover { border-color: rgba(255,255,255,0.12); }
.email-body { padding: 16px 20px; }
.email-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; margin-bottom: 6px;
}
.email-title { font-size: 0.88rem; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.email-desc { font-size: 0.74rem; color: var(--text3); line-height: 1.5; }
.email-actions { margin-top: 10px; }
.preview-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px;
  border-radius: var(--r-sm); border: 1px solid var(--border); background: transparent;
  color: var(--text2); font-size: 0.74rem; font-weight: 500;
  cursor: pointer; transition: all .15s; font-family: 'Inter', sans-serif;
}
.preview-btn:hover { border-color: var(--border-h); color: var(--gold); background: rgba(201,169,110,0.06); }
.preview-btn:disabled { opacity: .4; cursor: not-allowed; }

.email-creative {
  width: 180px; min-height: 95px; position: relative; flex-shrink: 0;
  background: var(--bg2); display: flex; align-items: center; justify-content: center;
  border-left: 1px solid var(--border);
}
.email-creative img { width: 100%; height: 100%; object-fit: cover; display: block; }
.creative-spinner {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text3); font-size: 0.68rem; text-align: center; padding: 12px;
}
.spin-ring {
  width: 20px; height: 20px; border: 2px solid rgba(201,169,110,0.2);
  border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.no-image { color: var(--text3); font-size: 0.7rem; text-align: center; padding: 16px; opacity: .5; }

/* Leads */
.leads-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.leads-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.leads-title { font-size: 0.82rem; font-weight: 600; }
.leads-count { font-size: 0.72rem; color: var(--text3); }
.leads-list { max-height: 220px; overflow-y: auto; }
.lead-row {
  display: flex; align-items: center; gap: 12px; padding: 9px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.77rem;
}
.lead-row:last-child { border-bottom: none; }
.lead-name { font-weight: 500; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lead-email { color: var(--text3); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lead-badge { font-size: 0.65rem; font-weight: 600; padding: 1px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.b-no-email { background: rgba(255,80,112,0.12); color: var(--red); }
.b-activa   { background: rgba(64,200,152,0.12); color: var(--green); }
.b-nueva    { background: rgba(201,169,110,0.12); color: var(--gold); }
.b-done     { background: rgba(80,128,255,0.12); color: var(--blue); }

/* Activate */
.activate-bar {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
  padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.activate-info { font-size: 0.8rem; color: var(--text2); }
.activate-info strong { color: var(--text); }
.activate-btn {
  display: flex; align-items: center; gap: 8px; padding: 10px 24px;
  border-radius: var(--r-sm); border: 1px solid rgba(64,200,152,0.3);
  background: rgba(64,200,152,0.1); color: var(--green);
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  transition: all .2s; font-family: 'Inter', sans-serif; white-space: nowrap;
}
.activate-btn:hover { background: rgba(64,200,152,0.18); border-color: rgba(64,200,152,0.5); }
.activate-btn:disabled { opacity: .45; cursor: not-allowed; }
.activate-result { font-size: 0.78rem; margin-top: 10px; display: none; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.82);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #0d0e1a; border: 1px solid var(--border); border-radius: var(--r);
  width: 680px; max-width: 95vw; max-height: 88vh;
  display: flex; flex-direction: column;
  transform: translateY(14px); transition: transform .25s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-head {
  padding: 18px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-title { font-size: 0.88rem; font-weight: 600; }
.modal-subject { font-size: 0.74rem; color: var(--text3); margin-top: 3px; }
.modal-close {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif;
}
.modal-close:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-loading { text-align: center; padding: 60px 0; color: var(--text3); font-size: .85rem; }
.modal-email-frame {
  background: #fff; color: #1a1a1a; border-radius: 8px; padding: 28px 32px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  font-size: 14px; line-height: 1.6;
}
.modal-email-frame p { margin-bottom: 14px; }
.modal-email-frame a { color: #1a56ff; }
.field-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }

@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
  .left-panel { position: static; }
  .email-creative { width: 120px; }
}
@media (max-width: 600px) {
  .shell { padding: 16px 16px 40px; }
  .activate-bar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<div class="shell">
  <header>
    <div class="logo">
      <div class="logo-mark">A</div>
      <div>
        <div class="logo-text">Actual<span>yza</span></div>
        <div class="logo-sub">Pre-vuelo de Campaña</div>
      </div>
    </div>
    <div class="header-right">
      <a href="/" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Dashboard
      </a>
      <a href="/campaigns" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Campañas
      </a>
      <button class="btn" onclick="regenAssets(this)" title="Regenerar creativos (~$0.32)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        Actualizar creativos
      </button>
    </div>
  </header>

  <div class="main-grid">
    <div class="left-panel">
      <div class="panel-label">Grupos de campaña</div>
      <div id="group-selector">
        <div style="color:var(--text3);font-size:.78rem;text-align:center;padding:24px 0">Cargando…</div>
      </div>
    </div>

    <div id="right-panel">
      <div class="empty-state">
        <div class="empty-icon">✈️</div>
        <div class="empty-title">Selecciona un grupo para el pre-vuelo</div>
        <div class="empty-sub">Ciudad + categoría → revisa la secuencia → activa</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="modal-title">Preview</div>
        <div class="modal-subject" id="modal-subject"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-loading">Generando con Claude…</div>
    </div>
  </div>
</div>

<script>
let allClinics = [];
let allAssets  = {};
let selected   = null;

const CITIES     = ['Miami','Orlando','Dallas'];
const CATEGORIES = ['dental','estetica','medspa','wellness'];
const CAT_LABEL  = {dental:'Dental', estetica:'Esthetic', medspa:'Med Spa', wellness:'Wellness'};
const CAT_COLOR  = {dental:'var(--blue)', estetica:'var(--purple)', medspa:'var(--teal)', wellness:'var(--green)'};
const CITY_COLOR = {Miami:'var(--blue)', Orlando:'var(--green)', Dallas:'var(--gold)'};

document.addEventListener('DOMContentLoaded', init);

async function init() {
  [allClinics, allAssets] = await Promise.all([
    fetch('/api/clinics').then(r => r.json()),
    fetch('/api/creative-assets').then(r => r.json()).then(d => d.assets || {}),
  ]);
  renderSelector();
  pollAssets();
}

const groupLeads     = (city, cat) => allClinics.filter(c => c.ciudad === city && c.categoria === cat);
const eligibleLeads  = leads => leads.filter(c => c.email && (!c.campana_email || c.campana_email === 'No iniciada'));

// ── Selector ──────────────────────────────────────────────────
function renderSelector() {
  document.getElementById('group-selector').innerHTML = CATEGORIES.map(cat =>
    `<div class="city-section">
      <div class="city-name" style="color:${CAT_COLOR[cat]}">${CAT_LABEL[cat]}</div>
      ${CITIES.map(city => {
        const n = eligibleLeads(groupLeads(city, cat)).length;
        const active = selected?.city === city && selected?.cat === cat;
        return `<button class="group-btn ${active ? 'active' : ''}" onclick="selectGroup('${city}','${cat}')">
          <span>${city}</span>
          <span class="group-count">${n}</span>
        </button>`;
      }).join('')}
    </div>`
  ).join('');
}

// ── Pre-flight ────────────────────────────────────────────────
function selectGroup(city, cat) {
  selected = {city, cat};
  renderSelector();

  const leads    = groupLeads(city, cat);
  const eligible = eligibleLeads(leads);
  const activas  = leads.filter(c => c.campana_email === 'Activa').length;
  const completas= leads.filter(c => c.campana_email === 'Completada').length;
  const sinEmail = leads.filter(c => !c.email).length;
  const first    = eligible[0] || leads[0];

  document.getElementById('right-panel').innerHTML = `
    <div class="preflight">

      <div class="group-header">
        <div class="group-title">
          <span style="color:${CITY_COLOR[city]}">${city}</span>
          <span style="color:var(--text3);font-weight:400;font-size:.9rem"> / </span>
          <span style="color:${CAT_COLOR[cat]}">${CAT_LABEL[cat]}</span>
        </div>
        <div class="stats-row">
          ${stat(leads.length,   'var(--text)',   'Total leads')}
          ${stat(eligible.length,'var(--gold)',   'Elegibles')}
          ${stat(activas,        'var(--green)',  'Secuencias activas')}
          ${stat(completas,      'var(--blue)',   'Completadas')}
          ${stat(sinEmail,       'var(--text3)',  'Sin correo')}
        </div>
      </div>

      <div>
        <div class="seq-label">Secuencia de emails — vista previa</div>
        <div class="seq-list" id="seq-list">
          ${emailCard(1,   cat, first, 'Introducción',            'Primer contacto en frío. Texto plano sin imagen — máxima entregabilidad.', false, false)}
          ${emailCard(2,   cat, first, 'Seguimiento (no abrió)',  'Segunda oportunidad con ángulo diferente. Creativo de impacto incluido.', true, false)}
          ${emailCard('2b',cat, first, 'Seguimiento (sí abrió)', 'Para quien abrió Email 1 pero no respondió. Más profundo + link Cal.com.', true, true)}
          ${emailCard(3,   cat, first, 'Prueba social',           'Historia de una clínica similar + resultados. Creativo + link Cal.com.', true, false)}
          ${emailCard(4,   cat, first, 'Último contacto',         'Cierre respetuoso. Link Cal.com como CTA principal. Sin imagen.', false, false)}
        </div>
      </div>

      <div class="leads-card">
        <div class="leads-header">
          <div class="leads-title">Leads del grupo</div>
          <div class="leads-count">${leads.length} total · ${eligible.length} elegibles</div>
        </div>
        <div class="leads-list">
          ${leads.length
            ? leads.slice().sort((a,b)=>(b.lead_score||0)-(a.lead_score||0)).map(c => {
                let badge, bc;
                if (!c.email)                              { badge='Sin correo'; bc='b-no-email'; }
                else if (c.campana_email === 'Activa')     { badge='Activa';     bc='b-activa'; }
                else if (c.campana_email === 'Completada') { badge='Completa';   bc='b-done'; }
                else                                       { badge='Elegible';   bc='b-nueva'; }
                return `<div class="lead-row">
                  <div class="lead-name">${escHtml(c.nombre)}</div>
                  <div class="lead-email">${escHtml(c.email||'—')}</div>
                  <span class="lead-badge ${bc}">${badge}</span>
                </div>`;
              }).join('')
            : '<div style="padding:20px;text-align:center;color:var(--text3);font-size:.78rem">Sin leads en este grupo</div>'}
        </div>
      </div>

      <div class="activate-bar">
        <div class="activate-info">
          Enviar <strong>Email 1</strong> a <strong>${eligible.length} leads elegibles</strong> de ${city} / ${CAT_LABEL[cat]}.
          ${eligible.length === 0 ? '<br><span style="color:var(--red);font-size:.72rem">Sin leads elegibles con correo en este grupo.</span>' : ''}
        </div>
        <button class="activate-btn" id="activate-btn"
          onclick="activateGroup('${city}','${cat}',this)"
          ${eligible.length === 0 ? 'disabled' : ''}>
          🚀 Activar secuencia
        </button>
      </div>
      <div class="activate-result" id="activate-result"></div>

    </div>`;

  updateCreatives(cat);
}

function stat(val, color, label) {
  return `<div class="stat-item">
    <div class="stat-val" style="color:${color}">${val}</div>
    <div class="stat-lbl">${label}</div>
  </div>`;
}

function emailCard(num, cat, first, title, desc, hasCreative, is2b) {
  const emailNum   = num === '2b' ? 2 : num;
  const creativeKey = (num === 3) ? 3 : 2;
  const nid        = first?.notion_id || '';
  const colors     = {'1':'var(--text3)','2':'var(--orange)','2b':'var(--teal)','3':'var(--purple)','4':'var(--blue)'};
  const col        = colors[String(num)] || 'var(--text3)';

  const creative = hasCreative
    ? `<div class="email-creative" id="cr-${num}-${cat}">
        <div class="creative-spinner"><div class="spin-ring"></div><span>Cargando…</span></div>
       </div>`
    : `<div class="email-creative"><div class="no-image">Sin<br>imagen</div></div>`;

  return `<div class="email-card">
    <div class="email-body">
      <div class="email-tag" style="color:${col}">
        <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${col};opacity:.7"></span>
        Email ${num}
      </div>
      <div class="email-title">${title}</div>
      <div class="email-desc">${desc}</div>
      <div class="email-actions">
        <button class="preview-btn" ${!nid ? 'disabled' : ''}
          onclick="previewEmail('${nid}',${emailNum},${is2b},'Email ${num} — ${title}')">
          👁 Ver preview
        </button>
      </div>
    </div>
    ${creative}
  </div>`;
}

// ── Creative images ───────────────────────────────────────────
function updateCreatives(cat) {
  const assets = allAssets[cat] || {};
  [[2,'cr-2'],[3,'cr-3']].forEach(([n, prefix]) => {
    const el  = document.getElementById(`${prefix}-${cat}`);
    if (!el) return;
    const url = assets[String(n)];
    if (url) {
      el.innerHTML = `<img src="${url}" alt="Email ${n} creativo"
        onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>No disponible</div>'">`;
    } else {
      el.innerHTML = `<div class="creative-spinner"><div class="spin-ring"></div><span>Generando…</span></div>`;
    }
  });
  // Email 2b uses same creative as email 2
  const el2b = document.getElementById(`cr-2b-${cat}`);
  if (el2b) {
    const url = assets['2'];
    if (url) {
      el2b.innerHTML = `<img src="${url}" alt="Email 2b creativo"
        onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>No disponible</div>'">`;
    } else {
      el2b.innerHTML = `<div class="creative-spinner"><div class="spin-ring"></div><span>Generando…</span></div>`;
    }
  }
}

let pollTimer = null;
function pollAssets() {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const data = await fetch('/api/creative-assets').then(r => r.json());
    allAssets  = data.assets || {};
    if (selected) updateCreatives(selected.cat);
    const done = CATEGORIES.every(c => allAssets[c]?.['2'] && allAssets[c]?.['3']);
    if (done) clearInterval(pollTimer);
  }, 4000);
}

// ── Preview modal ─────────────────────────────────────────────
async function previewEmail(nid, num, prevOpened, label) {
  if (!nid) return;
  document.getElementById('modal-title').textContent   = `Preview — ${label}`;
  document.getElementById('modal-subject').textContent = '';
  document.getElementById('modal-body').innerHTML      = '<div class="modal-loading">Generando con Claude… (5–10 seg)</div>';
  document.getElementById('modal').classList.add('open');

  try {
    const r    = await fetch('/api/preview-email', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({notion_id: nid, email_num: num, previous_opened: prevOpened}),
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'Error desconocido');
    document.getElementById('modal-subject').textContent = `Asunto: ${data.subject}`;
    document.getElementById('modal-body').innerHTML = `
      <div class="field-label" style="margin-bottom:4px">Asunto</div>
      <div style="font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:20px;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:8px">${escHtml(data.subject)}</div>
      <div class="field-label" style="margin-bottom:8px">Cuerpo del email</div>
      <div class="modal-email-frame">${data.body_html}</div>`;
  } catch(e) {
    document.getElementById('modal-body').innerHTML =
      `<div style="color:var(--red);padding:20px;font-size:.82rem">Error: ${escHtml(e.message)}</div>`;
  }
}

function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// ── Activate ──────────────────────────────────────────────────
async function activateGroup(city, cat, btn) {
  const n = eligibleLeads(groupLeads(city, cat)).length;
  if (!n || !confirm(`Se enviará Email 1 a ${n} leads de ${city} / ${CAT_LABEL[cat]}.\n\n¿Confirmar?`)) return;
  btn.disabled = true; btn.textContent = 'Enviando…';
  const result = document.getElementById('activate-result');
  result.style.display = 'none';

  const r    = await fetch('/api/enable-group', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({city, category: cat}),
  });
  const data = await r.json();
  result.style.display = 'block';

  if (data.ok) {
    result.style.color = 'var(--green)';
    result.textContent = `✓ Email 1 enviado a ${data.enabled} de ${data.total} leads.${data.errors?.length ? ` ${data.errors.length} errores.` : ''}`;
    btn.textContent = '✓ Activado'; btn.style.color = 'var(--green)';
    allClinics = await fetch('/api/clinics').then(r => r.json());
    await fetch('/api/refresh', {method:'POST'});
    setTimeout(() => selectGroup(city, cat), 1800);
  } else {
    result.style.color = 'var(--red)';
    result.textContent = 'Error: ' + (data.error || 'desconocido');
    btn.disabled = false; btn.textContent = '🚀 Activar secuencia';
  }
}

// ── Regen ─────────────────────────────────────────────────────
async function regenAssets(btn) {
  if (!confirm('Regenerar todos los creativos costará ~$0.32 en Flux.\n\n¿Confirmar?')) return;
  btn.disabled = true;
  await fetch('/api/regenerate-assets', {method:'POST'});
  allAssets = {};
  if (selected) updateCreatives(selected.cat);
  pollAssets();
  btn.disabled = false;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
