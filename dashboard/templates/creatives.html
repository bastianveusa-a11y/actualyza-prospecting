<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualyza — Creativos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080910; --bg2: #0d0e1a; --bg3: #12131f;
  --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.07);
  --border-h: rgba(201,169,110,0.3);
  --gold: #c9a96e; --gold-l: #e8c97a; --gold-d: #9a7840;
  --teal: #40c898;
  --text: #eeeef8; --text2: #7878a0; --text3: #50506a;
  --blue: #5080ff; --green: #40c898; --orange: #ff9050; --red: #ff5070;
  --r: 12px; --r-sm: 8px;
}
html { font-size: 14px; }
body {
  font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(80,128,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(201,169,110,0.04) 0%, transparent 60%);
}
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.shell { max-width: 1440px; margin: 0 auto; padding: 24px 28px 60px; }

/* Header */
header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #0a0a0f;
}
.logo-text { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
.logo-text span { color: var(--gold); }
.logo-sub { font-size: 0.72rem; color: var(--text3); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
  border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--card);
  color: var(--text2); font-size: 0.8rem; font-weight: 500; cursor: pointer;
  transition: all .2s; font-family: 'Inter', sans-serif; text-decoration: none;
}
.btn:hover { border-color: var(--border-h); color: var(--gold); background: rgba(201,169,110,0.06); }
.btn svg { width: 14px; height: 14px; }
.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-d) 100%);
  border-color: transparent; color: #0a0a0f; font-weight: 600;
}
.btn-gold:hover { opacity: .9; color: #0a0a0f; }
.btn-teal { background: rgba(64,200,152,0.12); border-color: rgba(64,200,152,0.25); color: var(--teal); }
.btn-teal:hover { background: rgba(64,200,152,0.2); color: var(--teal); }
.btn-danger { background: rgba(255,80,112,0.08); border-color: rgba(255,80,112,0.2); color: var(--red); }
.btn-danger:hover { background: rgba(255,80,112,0.15); color: var(--red); }

/* Nav tabs */
.nav-tabs { display: flex; gap: 4px; margin-bottom: 28px; padding: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); width: fit-content; }
.nav-tab { padding: 6px 16px; border-radius: var(--r-sm); font-size: 0.8rem; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .15s; text-decoration: none; }
.nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-tab.active { background: rgba(201,169,110,0.12); color: var(--gold); border: 1px solid rgba(201,169,110,0.2); }

/* Notification banner */
.notif-banner {
  display: none; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: var(--r-sm); margin-bottom: 20px;
  border: 1px solid;
}
.notif-banner.warning { background: rgba(255,144,80,0.06); border-color: rgba(255,144,80,0.2); }
.notif-banner.info    { background: rgba(80,128,255,0.06); border-color: rgba(80,128,255,0.2); }
.notif-banner.error   { background: rgba(255,80,112,0.06); border-color: rgba(255,80,112,0.2); }
.notif-icon { font-size: 1rem; flex-shrink: 0; }
.notif-body { flex: 1; }
.notif-title { font-size: 0.82rem; font-weight: 600; }
.notif-sub   { font-size: 0.74rem; color: var(--text2); margin-top: 2px; }
.notif-dismiss { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1.1rem; padding: 2px; }
.notif-dismiss:hover { color: var(--text2); }

/* Main grid */
.main-grid { display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: start; }

/* Sidebar */
.sidebar {
  position: sticky; top: 24px;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px;
}
.sidebar-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
.sidebar-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: var(--r-sm); cursor: pointer;
  border: 1px solid transparent; font-size: 0.8rem; color: var(--text2);
  transition: all .15s; margin-bottom: 4px; background: none; width: 100%;
  font-family: 'Inter', sans-serif; text-align: left;
}
.sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.sidebar-item.active { background: rgba(201,169,110,0.1); border-color: rgba(201,169,110,0.2); color: var(--gold); }
.sidebar-count { font-size: 0.68rem; font-weight: 600; padding: 1px 7px; border-radius: 10px; background: rgba(255,255,255,0.07); color: var(--text3); }
.sidebar-item.active .sidebar-count { background: rgba(201,169,110,0.15); color: var(--gold); }
.sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.sidebar-action { width: 100%; margin-top: 8px; justify-content: center; }

/* Content area */
.content-area { display: flex; flex-direction: column; gap: 32px; }

/* Category section */
.cat-section { display: none; }
.cat-section.visible { display: block; }
.cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cat-title { font-size: 1.1rem; font-weight: 700; }
.cat-badge { font-size: 0.68rem; font-weight: 600; padding: 2px 10px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.04em; margin-left: 8px; }
.cat-dental   { background: rgba(80,128,255,0.1); color: var(--blue); }
.cat-estetica { background: rgba(176,96,240,0.1); color: #b060f0; }
.cat-medspa   { background: rgba(64,200,152,0.1); color: var(--teal); }
.cat-wellness { background: rgba(255,144,80,0.1); color: var(--orange); }

.email-cases { display: flex; flex-direction: column; gap: 20px; }

/* Approval card */
.approval-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden;
}
.approval-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.email-tag { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); }
.email-tag span { color: var(--text2); margin-left: 6px; text-transform: none; letter-spacing: 0; }
.approval-status { display: flex; align-items: center; gap: 8px; }
.status-pill {
  font-size: 0.68rem; font-weight: 600; padding: 2px 10px; border-radius: 10px;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.status-approved { background: rgba(64,200,152,0.1); color: var(--green); border: 1px solid rgba(64,200,152,0.2); }
.status-pending  { background: rgba(255,144,80,0.1); color: var(--orange); border: 1px solid rgba(255,144,80,0.2); }
.status-empty    { background: rgba(255,255,255,0.04); color: var(--text3); border: 1px solid var(--border); }
.status-overdue  { background: rgba(255,80,112,0.1); color: var(--red); border: 1px solid rgba(255,80,112,0.2); }
.status-generating { background: rgba(80,128,255,0.1); color: var(--blue); border: 1px solid rgba(80,128,255,0.2); }
.expiry-info { font-size: 0.72rem; color: var(--text3); }

.approval-body { padding: 18px; }

/* Options grid */
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

.option-card {
  border: 2px solid var(--border); border-radius: var(--r-sm); overflow: hidden;
  transition: border-color .2s; position: relative; cursor: default;
}
.option-card.selected { border-color: var(--gold); }
.option-card.selected-teal { border-color: var(--teal); }

.option-label {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; background: var(--bg3); border-bottom: 1px solid var(--border);
}
.option-name { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); }
.option-badge { font-size: 0.66rem; font-weight: 600; padding: 1px 7px; border-radius: 8px; }
.badge-gold { background: rgba(201,169,110,0.15); color: var(--gold); }
.badge-teal { background: rgba(64,200,152,0.15); color: var(--teal); }
.badge-approved { background: rgba(64,200,152,0.1); color: var(--green); }
.badge-current { background: rgba(201,169,110,0.15); color: var(--gold); }

.option-preview {
  width: 100%; height: 160px; background: var(--bg3);
  display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
}
.option-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
.preview-loading {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  color: var(--text3); font-size: 0.72rem;
}
.spin { width: 22px; height: 22px; border: 2px solid rgba(201,169,110,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.preview-empty { color: var(--text3); font-size: 0.72rem; text-align: center; padding: 16px; }

.option-actions { padding: 10px 12px; background: var(--bg3); border-top: 1px solid var(--border); display: flex; gap: 8px; }
.btn-choose {
  flex: 1; padding: 6px 12px; border-radius: var(--r-sm); font-size: 0.76rem; font-weight: 600;
  cursor: pointer; border: none; transition: all .2s; font-family: 'Inter', sans-serif;
}
.btn-choose-a { background: rgba(201,169,110,0.15); color: var(--gold); border: 1px solid rgba(201,169,110,0.3); }
.btn-choose-a:hover { background: rgba(201,169,110,0.25); }
.btn-choose-b { background: rgba(64,200,152,0.12); color: var(--teal); border: 1px solid rgba(64,200,152,0.25); }
.btn-choose-b:hover { background: rgba(64,200,152,0.22); }
.btn-choose:disabled { opacity: .35; cursor: not-allowed; }
.btn-choose.is-chosen { cursor: default; }

.card-actions { display: flex; align-items: center; gap: 10px; }
.regen-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
  border-radius: var(--r-sm); border: 1px solid var(--border); background: transparent;
  color: var(--text3); font-size: 0.76rem; font-weight: 500; cursor: pointer;
  transition: all .2s; font-family: 'Inter', sans-serif;
}
.regen-btn:hover { border-color: var(--border-h); color: var(--gold); }
.regen-btn svg { width: 13px; height: 13px; }

/* Approved bar */
.approved-bar {
  display: none; align-items: center; gap: 10px; padding: 10px 14px;
  background: rgba(64,200,152,0.05); border: 1px solid rgba(64,200,152,0.15);
  border-radius: var(--r-sm); margin-top: 12px; font-size: 0.78rem; color: var(--text2);
}
.approved-bar.visible { display: flex; }
.approved-check { color: var(--green); font-size: 1rem; }
.approved-url { font-size: 0.68rem; color: var(--text3); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-sm);
  padding: 12px 18px; font-size: 0.82rem; color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0; transform: translateY(8px);
  transition: all .3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: rgba(64,200,152,0.3); color: var(--green); }
.toast.error   { border-color: rgba(255,80,112,0.3); color: var(--red); }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">A</div>
      <div>
        <div class="logo-text">Actual<span>yza</span></div>
        <div class="logo-sub">Prospecting Dashboard</div>
      </div>
    </div>
    <div class="header-right">
      <a href="/" class="btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 8h10M3 4h10M3 12h7"/>
        </svg>
        Pipeline
      </a>
      <a href="/campaigns" class="btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 4l6-2 6 2v8l-6 2-6-2V4z"/>
        </svg>
        Campañas
      </a>
    </div>
  </header>

  <!-- Nav tabs -->
  <div class="nav-tabs">
    <a href="/" class="nav-tab">Dashboard</a>
    <a href="/campaigns" class="nav-tab">Campañas</a>
    <span class="nav-tab active">Creativos</span>
    <a href="/preview" class="nav-tab">Pre-vuelo</a>
  </div>

  <!-- Notification banners -->
  <div id="notif-area"></div>

  <!-- Main grid -->
  <div class="main-grid">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-label">Categorías</div>
      <button class="sidebar-item active" onclick="showCat('all')" id="btn-all">
        <span>Todas</span>
        <span class="sidebar-count" id="cnt-all">8</span>
      </button>
      <button class="sidebar-item" onclick="showCat('dental')" id="btn-dental">
        <span>Dental</span>
        <span class="sidebar-count" id="cnt-dental">2</span>
      </button>
      <button class="sidebar-item" onclick="showCat('estetica')" id="btn-estetica">
        <span>Estética</span>
        <span class="sidebar-count" id="cnt-estetica">2</span>
      </button>
      <button class="sidebar-item" onclick="showCat('medspa')" id="btn-medspa">
        <span>MedSpa</span>
        <span class="sidebar-count" id="cnt-medspa">2</span>
      </button>
      <button class="sidebar-item" onclick="showCat('wellness')" id="btn-wellness">
        <span>Wellness</span>
        <span class="sidebar-count" id="cnt-wellness">2</span>
      </button>

      <hr class="sidebar-divider">
      <button class="btn btn-gold sidebar-action" onclick="generateAll()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M8 2v4l2 2M3.3 3.3A6 6 0 1 0 14 8"/>
        </svg>
        Generar todo
      </button>
      <div id="gen-all-status" style="font-size:.72rem;color:var(--text3);text-align:center;margin-top:8px;"></div>
    </aside>

    <!-- Content -->
    <div class="content-area" id="content">

      <!-- dental -->
      <section class="cat-section visible" data-cat="dental" id="sec-dental">
        <div class="cat-header">
          <div><span class="cat-title">Dental</span><span class="cat-badge cat-dental">4 emails/mes</span></div>
        </div>
        <div class="email-cases" id="cases-dental"></div>
      </section>

      <!-- estetica -->
      <section class="cat-section visible" data-cat="estetica" id="sec-estetica">
        <div class="cat-header">
          <div><span class="cat-title">Estética</span><span class="cat-badge cat-estetica">4 emails/mes</span></div>
        </div>
        <div class="email-cases" id="cases-estetica"></div>
      </section>

      <!-- medspa -->
      <section class="cat-section visible" data-cat="medspa" id="sec-medspa">
        <div class="cat-header">
          <div><span class="cat-title">MedSpa</span><span class="cat-badge cat-medspa">4 emails/mes</span></div>
        </div>
        <div class="email-cases" id="cases-medspa"></div>
      </section>

      <!-- wellness -->
      <section class="cat-section visible" data-cat="wellness" id="sec-wellness">
        <div class="cat-header">
          <div><span class="cat-title">Wellness</span><span class="cat-badge cat-wellness">4 emails/mes</span></div>
        </div>
        <div class="email-cases" id="cases-wellness"></div>
      </section>

    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const CATS = ['dental','estetica','medspa','wellness'];
const NUMS = [2, 3];
const EMAIL_LABELS = {
  2: { name: 'Email 2 — Impacto', desc: 'Banner de FOMO y urgencia. Acompaña el segundo email de la secuencia.' },
  3: { name: 'Email 3 — Prueba social', desc: 'Caso de éxito con cifras reales. Acompaña el tercer email.' },
};

let state = {};
let pollingIntervals = {};

/* ── Init ── */
async function init() {
  await loadNotifications();
  await loadStatus();
  setInterval(partialRefresh, 8000);
}

/* ── Notifications ── */
async function loadNotifications() {
  try {
    const r = await fetch('/api/notifications');
    const d = await r.json();
    const area = document.getElementById('notif-area');
    area.innerHTML = '';
    (d.notifications || []).forEach(n => {
      const icon = { warning: '⚠', info: 'ℹ', error: '✕' }[n.type] || 'ℹ';
      const div = document.createElement('div');
      div.className = `notif-banner ${n.type}`;
      div.style.display = 'flex';
      div.innerHTML = `
        <span class="notif-icon">${icon}</span>
        <div class="notif-body">
          <div class="notif-title">${n.title}</div>
          ${n.body ? `<div class="notif-sub">${n.body}</div>` : ''}
        </div>
        ${n.action ? `<a href="${n.action}" class="btn" style="flex-shrink:0;font-size:.72rem">${n.action_label}</a>` : ''}
        <button class="notif-dismiss" onclick="this.parentElement.remove()">×</button>
      `;
      area.appendChild(div);
    });
  } catch(e) {}
}

/* ── Status load ── */
async function loadStatus() {
  const r = await fetch('/api/creatives/status');
  const d = await r.json();
  state = d.creatives || {};
  renderAll();
}

async function partialRefresh() {
  const r = await fetch('/api/creatives/status');
  const d = await r.json();
  const prev = state;
  state = d.creatives || {};
  // Re-render only cards that changed generating status
  for (const key in state) {
    const was = prev[key] || {};
    const now = state[key] || {};
    if (was.generating !== now.generating || was.approved !== now.approved) {
      const [cat, num] = key.split('_');
      renderCard(cat, parseInt(num));
    }
  }
}

/* ── Render ── */
function renderAll() {
  CATS.forEach(cat => {
    const container = document.getElementById(`cases-${cat}`);
    if (!container) return;
    container.innerHTML = '';
    NUMS.forEach(num => {
      container.appendChild(buildCard(cat, num));
    });
  });
}

function renderCard(cat, num) {
  const key = `${cat}_${num}`;
  const existing = document.getElementById(`card-${key}`);
  if (!existing) return;
  const newCard = buildCard(cat, num);
  existing.replaceWith(newCard);
}

function buildCard(cat, num) {
  const key = `${cat}_${num}`;
  const s   = state[key] || {};
  const lbl = EMAIL_LABELS[num];

  // Status pill
  let statusHTML = '';
  if (s.generating) {
    statusHTML = `<span class="status-pill status-generating">Generando…</span>`;
  } else if (s.overdue) {
    statusHTML = `<span class="status-pill status-overdue">Vencido · ${s.days_since}d</span>`;
  } else if (s.approved) {
    statusHTML = `<span class="status-pill status-approved">Aprobado · ${s.days_since ?? 0}d</span>`;
  } else if (s.a || s.b) {
    statusHTML = `<span class="status-pill status-pending">Pendiente aprobación</span>`;
  } else {
    statusHTML = `<span class="status-pill status-empty">Sin generar</span>`;
  }

  // Build option HTML
  const optA = buildOption(key, 'a', s);
  const optB = buildOption(key, 'b', s);

  // Approved bar
  const approvedBar = s.approved_url ? `
    <div class="approved-bar visible">
      <span class="approved-check">✓</span>
      <span>Creativo activo:</span>
      <span class="approved-url">${s.approved_url}</span>
    </div>` : '';

  const card = document.createElement('div');
  card.className = 'approval-card';
  card.id = `card-${key}`;
  card.innerHTML = `
    <div class="approval-card-header">
      <div>
        <div class="email-tag">${lbl.name}</div>
        <div style="font-size:.72rem;color:var(--text3);margin-top:2px">${lbl.desc}</div>
      </div>
      <div class="approval-status">
        ${statusHTML}
      </div>
    </div>
    <div class="approval-body">
      <div class="options-grid">
        ${optA}
        ${optB}
      </div>
      <div class="card-actions">
        <button class="regen-btn" onclick="regenerate('${cat}',${num})" ${s.generating ? 'disabled' : ''}>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M2.5 8A5.5 5.5 0 1 0 8 2.5" stroke-linecap="round"/>
            <path d="M2.5 4v4h4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          ${s.a || s.b ? 'Regenerar' : 'Generar opciones'}
        </button>
        ${s.generating ? '<span style="font-size:.72rem;color:var(--blue)">Generando opciones…</span>' : ''}
      </div>
      ${approvedBar}
    </div>
  `;
  return card;
}

function buildOption(key, opt, s) {
  const data = s[opt];
  const isApproved = s.approved === opt;
  const hasData = data && data.url;
  const isA = opt === 'a';

  let previewHTML = '';
  if (s.generating && !hasData) {
    previewHTML = `<div class="preview-loading"><div class="spin"></div><span>Generando…</span></div>`;
  } else if (hasData) {
    previewHTML = `<img src="${data.url}" alt="Opción ${opt.toUpperCase()}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=preview-empty>No disponible</div>'">`;
  } else {
    previewHTML = `<div class="preview-empty">Sin generar</div>`;
  }

  const badgeClass = isA ? 'badge-gold' : 'badge-teal';
  const badgeLabel = isApproved ? '✓ Activo' : (isA ? 'Gold' : 'Teal');
  const badgeCls   = isApproved ? 'badge-approved' : badgeClass;

  const chooseClass = isA ? 'btn-choose-a' : 'btn-choose-b';
  const chooseLabel = isApproved ? '✓ Seleccionado' : `Elegir ${opt.toUpperCase()}`;
  const chooseDisabled = !hasData || s.generating ? 'disabled' : '';
  const chosenCls = isApproved ? 'is-chosen' : '';
  const cardSelectedCls = isApproved ? (isA ? 'selected' : 'selected-teal') : '';

  const [cat, num] = key.split('_');

  return `
    <div class="option-card ${cardSelectedCls}">
      <div class="option-label">
        <span class="option-name">Opción ${opt.toUpperCase()}</span>
        <span class="option-badge ${badgeCls}">${badgeLabel}</span>
      </div>
      <div class="option-preview">${previewHTML}</div>
      <div class="option-actions">
        <button class="btn-choose ${chooseClass} ${chosenCls}" ${chooseDisabled}
          onclick="approve('${cat}',${num},'${opt}')">
          ${chooseLabel}
        </button>
      </div>
    </div>
  `;
}

/* ── Actions ── */
function showCat(cat) {
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${cat}`)?.classList.add('active');
  document.querySelectorAll('.cat-section').forEach(s => {
    if (cat === 'all') { s.classList.add('visible'); }
    else { s.classList.toggle('visible', s.dataset.cat === cat); }
  });
}

async function approve(cat, num, option) {
  const key = `${cat}_${num}`;
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Guardando…';
  try {
    const r = await fetch(`/api/creatives/approve/${cat}/${num}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({option})
    });
    const d = await r.json();
    if (d.ok) {
      toast(`Opción ${option.toUpperCase()} aprobada ✓`, 'success');
      await loadStatus();
    } else {
      toast(d.error || 'Error al aprobar', 'error');
      btn.disabled = false;
    }
  } catch(e) {
    toast('Error de red', 'error');
    btn.disabled = false;
  }
}

async function regenerate(cat, num) {
  try {
    const r = await fetch(`/api/creatives/generate/${cat}/${num}`, { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      toast(`Generando opciones para ${cat} E${num}…`);
      // Optimistically update state
      const key = `${cat}_${num}`;
      if (!state[key]) state[key] = {};
      state[key].generating = true;
      renderCard(cat, num);
    }
  } catch(e) { toast('Error de red', 'error'); }
}

async function generateAll() {
  const status = document.getElementById('gen-all-status');
  status.textContent = 'Iniciando generación…';
  try {
    const r = await fetch('/api/creatives/generate-all', { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      status.textContent = 'Generando en background…';
      // Mark all as generating
      CATS.forEach(cat => NUMS.forEach(num => {
        const key = `${cat}_${num}`;
        if (!state[key]) state[key] = {};
        state[key].generating = true;
        renderCard(cat, num);
      }));
      setTimeout(() => { status.textContent = ''; }, 5000);
    }
  } catch(e) { status.textContent = 'Error de red'; }
}

/* ── Toast ── */
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => { el.className = 'toast'; }, 3500);
}

init();
</script>
</body>
</html>
